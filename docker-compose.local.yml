# Local dev override (NOT for production). Use with:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d postgres n8n dashboard
# Exposes n8n on localhost:5678 and dashboard on localhost:3000 (no Caddy/TLS).
services:
  n8n:
    environment:
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_SECURE_COOKIE=false
    ports:
      - "5678:5678"

  dashboard:
    ports:
      - "3000:3000"
    environment:
      - N8N_INGEST_WEBHOOK_URL=${N8N_INGEST_WEBHOOK_URL:-http://n8n:5678/webhook/outvibe-ingest}

  caddy:
    profiles:
      - production-only
